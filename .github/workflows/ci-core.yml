name: Core Build and Tests

on:
  pull_request:
    paths:
      - "packages/qa-runner-core/**"
      - "packages/qa-runner-daemon/**"
      - "packages/qa-runner-cli/**"
      - "packages/qa-runner-cloud/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-core.yml"
  push:
    branches: ["main"]

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build (core + daemon + cli)
        run: |
          npm run build -w @talenttic/qa-runner-core
          npm run build -w @talenttic/qa-runner-daemon
          npm run build -w @talenttic/qa-runner-cli

      - name: Core Tests
        run: npm run test -w @talenttic/qa-runner-core
